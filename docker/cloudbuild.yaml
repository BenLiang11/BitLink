steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker pull gcr.io/$PROJECT_ID/i-am-steve:base || exit 0
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-f', 'docker/base.Dockerfile',
    '-t', 'i-am-steve:base',
    '-t', 'gcr.io/$PROJECT_ID/i-am-steve:base',
    '--cache-from', 'gcr.io/$PROJECT_ID/i-am-steve:base',
    '.'
  ]
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/i-am-steve:base']
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-f', 'docker/Dockerfile',
    '-t', 'gcr.io/$PROJECT_ID/i-am-steve:latest',
    '.'
  ]

# Coverage report
- name: 'gcr.io/cloud-builders/docker'
  id: coverage
  args: [
    'build',
    '-f', 'docker/coverage.Dockerfile',
    '-t', 'i-am-steve:coverage',
    '-t', 'gcr.io/$PROJECT_ID/i-am-steve:coverage',
    '.'
  ]

images: ['gcr.io/$PROJECT_ID/i-am-steve:base', 
  'gcr.io/$PROJECT_ID/i-am-steve:latest',
  'gcr.io/$PROJECT_ID/i-am-steve:coverage']

