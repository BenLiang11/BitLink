listen 8004;

# URL Shortener Handler - Root path for main service
location / URLShortenerHandler {
    upload_dir ./data/uploads;
    db_path ./data/shortener.db;
    base_url http://localhost:8080;
}

# Echo Handler - For testing and debugging
location /echo EchoHandler {
}

# Static File Handler 1 - Serve static assets
location /static1 StaticHandler {
    root ./data/static1;
}

# Static File Handler 2 - Serve different static content
location /static2 StaticHandler {
    root ./data/static2;
}

# API Handler - RESTful API endpoints
location /api ApiHandler {
    data_path ./data/api;
}

# Health Check Handler - System health monitoring
location /health HealthHandler {
}

# Sleep handler
location /sleep SleepHandler {
}